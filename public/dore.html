<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام تسجيل الطلاب بالبطاقات الذكية - أكاديمية الرواد</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <!-- Animate.css -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap');
        
        :root {
            --primary-color: #4361ee;
            --secondary-color: #3f37c9;
            --success-color: #06d6a0;
            --warning-color: #ffb703;
            --danger-color: #e63946;
            --dark-color: #1e1e2f;
            --light-color: #f8f9fa;
            --gray-color: #6c757d;
            --card-bg: rgba(255, 255, 255, 0.95);
            --gradient-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-success: linear-gradient(135deg, #06d6a0 0%, #118ab2 100%);
            --gradient-warning: linear-gradient(135deg, #ffb703 0%, #fb8500 100%);
            --gradient-danger: linear-gradient(135deg, #e63946 0%, #9d0208 100%);
            --box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            --border-radius: 20px;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--gradient-primary);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.1"><path fill="white" d="M50 0 L100 50 L50 100 L0 50 Z"/></svg>');
            background-size: 50px 50px;
            animation: moveBackground 20s linear infinite;
            pointer-events: none;
        }
        
        @keyframes moveBackground {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(50px, 50px) rotate(10deg); }
        }
        
        .container-fluid {
            position: relative;
            z-index: 10;
            max-width: 1400px;
            width: 100%;
        }
        
        /* بطاقة المسح الرئيسية */
        .scan-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            overflow: hidden;
            animation: fadeInUp 0.6s ease-out;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* الهيدر */
        .scan-header {
            background: var(--gradient-primary);
            color: white;
            padding: 25px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .scan-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .school-logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid white;
            object-fit: cover;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .school-name {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .datetime-section {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px;
            margin-top: 15px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .current-time {
            font-size: 2.5rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 5px;
        }
        
        /* منطقة المسح */
        .scan-area {
            padding: 30px;
            background: rgba(255,255,255,0.5);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        
        .scan-input-wrapper {
            position: relative;
            max-width: 500px;
            margin: 0 auto;
        }
        
        .scan-input {
            width: 100%;
            padding: 20px 25px;
            font-size: 1.2rem;
            text-align: center;
            border: 3px solid #e9ecef;
            border-radius: 50px;
            background: white;
            transition: all 0.3s ease;
            font-family: 'Tajawal', sans-serif;
            letter-spacing: 2px;
        }
        
        .scan-input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 5px rgba(67, 97, 238, 0.2);
            outline: none;
        }
        
        /* بطاقة الطالب الافتراضية */
        .virtual-student-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            padding: 20px;
            color: white;
            position: relative;
            overflow: hidden;
            margin: 20px 0;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }
        
        .virtual-student-card:hover {
            transform: translateY(-5px);
        }
        
        .virtual-student-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 15s linear infinite;
        }
        
        .card-chip {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 50px;
            height: 40px;
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .card-chip i {
            font-size: 24px;
            color: #b8860b;
        }
        
        .student-avatar-large {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid white;
            object-fit: cover;
            margin: 0 auto 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .student-avatar-large i {
            font-size: 50px;
            color: white;
        }
        
        .student-name-card {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 5px;
            text-align: center;
        }
        
        .student-id-card {
            font-size: 0.9rem;
            opacity: 0.9;
            text-align: center;
            font-family: monospace;
            letter-spacing: 2px;
        }
        
        .card-number {
            font-size: 1.2rem;
            font-family: monospace;
            letter-spacing: 3px;
            margin: 15px 0;
            text-align: center;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 10px;
        }
        
        .card-expiry {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            font-size: 0.8rem;
            opacity: 0.8;
        }
        
        /* مؤشر الحالة */
        .status-indicator {
            display: inline-flex;
            align-items: center;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            margin: 20px 0;
            background: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }
        
        .status-ready {
            color: var(--success-color);
            border: 2px solid var(--success-color);
        }
        
        .status-scanning {
            color: var(--warning-color);
            border: 2px solid var(--warning-color);
            animation: pulse 1.5s infinite;
        }
        
        .status-success {
            color: var(--success-color);
            border: 2px solid var(--success-color);
            background: rgba(6, 214, 160, 0.1);
        }
        
        .status-error {
            color: var(--danger-color);
            border: 2px solid var(--danger-color);
            background: rgba(230, 57, 70, 0.1);
        }
        
        /* الأزرار */
        .action-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        
        .btn-action {
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
        }
        
        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        
        .btn-primary-custom {
            background: var(--gradient-primary);
            color: white;
        }
        
        .btn-success-custom {
            background: var(--gradient-success);
            color: white;
        }
        
        .btn-warning-custom {
            background: var(--gradient-warning);
            color: white;
        }
        
        /* قائمة المسحات الحديثة */
        .recent-scans {
            background: var(--light-color);
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .recent-scans-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--dark-color);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .recent-scans-list {
            max-height: 200px;
            overflow-y: auto;
        }
        
        .recent-scan-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #dee2e6;
            animation: fadeIn 0.3s ease-out;
        }
        
        /* رسائل التنبيه */
        .alert-message {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            min-width: 300px;
            max-width: 500px;
            padding: 15px 20px;
            border-radius: 10px;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideDown 0.3s ease-out;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translate(-50%, -20px);
            }
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }
        
        .alert-success {
            border-right: 5px solid var(--success-color);
        }
        
        .alert-error {
            border-right: 5px solid var(--danger-color);
        }
        
        /* مؤشر التحميل */
        .loading-spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(67, 97, 238, 0.2);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* تصميم متجاوب */
        @media (max-width: 768px) {
            .school-name {
                font-size: 1.4rem;
            }
            
            .current-time {
                font-size: 2rem;
            }
            
            .student-name-card {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="scan-card">
                    <!-- الهيدر -->
                    <div class="scan-header">
                        <div class="d-flex justify-content-center">
                            <div class="school-logo d-flex align-items-center justify-content-center bg-white">
                                <i class="bi bi-mortarboard display-4 text-primary"></i>
                            </div>
                        </div>
                        <h1 class="school-name">أكاديمية الرواد للتعليم والمعارف</h1>
                        <p class="school-slogan">نظام تسجيل الطلاب بالبطاقات الذكية</p>
                        
                        <div class="datetime-section">
                            <div class="current-time">
                                <i class="bi bi-clock"></i>
                                <span id="timeDisplay">--:--:--</span>
                            </div>
                            <div class="current-date">
                                <i class="bi bi-calendar"></i>
                                <span id="dateDisplay">---</span>
                            </div>
                        </div>
                    </div>
                    
                    <!-- منطقة المسح -->
                    <div class="scan-area">
                        <div class="text-center mb-4">
                            <div class="status-indicator status-ready" id="scannerStatus">
                                <i class="bi bi-check-circle"></i>
                                <span>جاهز لمسح البطاقة</span>
                            </div>
                        </div>
                        
                        <div class="scan-input-wrapper">
                            <input type="text" 
                                   class="scan-input" 
                                   id="cardInput" 
                                   placeholder="امسح البطاقة أو أدخل الرقم يدوياً"
                                   autocomplete="off"
                                   autofocus>
                            <i class="bi bi-upc-scan scan-icon" style="position: absolute; left: 20px; top: 50%; transform: translateY(-50%); font-size: 1.5rem; color: var(--primary-color);"></i>
                        </div>
                        
                        <div class="action-buttons">
                            <button class="btn-action btn-primary-custom" onclick="focusScanner()">
                                <i class="bi bi-upc-scan"></i>
                                <span>تركيز الماسح</span>
                            </button>
                            <button class="btn-action btn-success-custom" onclick="manualEntry()">
                                <i class="bi bi-pencil-square"></i>
                                <span>إدخال يدوي</span>
                            </button>
                            <button class="btn-action btn-warning-custom" onclick="clearScanner()">
                                <i class="bi bi-arrow-clockwise"></i>
                                <span>إعادة تعيين</span>
                            </button>
                        </div>
                    </div>
                    
                    <!-- منطقة النتائج -->
                    <div class="result-area p-4" id="resultArea">
                        <div id="scanResult"></div>
                    </div>
                    
                    <!-- قائمة المسحات الحديثة -->
                    <div class="recent-scans">
                        <div class="recent-scans-title">
                            <i class="bi bi-clock-history"></i>
                            <span>آخر عمليات المسح</span>
                        </div>
                        <div class="recent-scans-list" id="recentScansList">
                            <div class="recent-scan-item text-muted">
                                <span>لا توجد عمليات مسح حديثة</span>
                            </div>
                        </div>
                    </div>
                    
                    <!-- تذييل الصفحة -->
                    <div class="footer p-3 text-center bg-dark text-white">
                        <p class="mb-0">
                            <i class="bi bi-c-circle"></i>
                            2026 Redox Academy - جميع الحقوق محفوظة
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/locale/ar.js"></script>
    
    <script>
        // ==============================================
        // نظام تسجيل الطلاب بالبطاقات - الإصدار المحسن
        // ==============================================
        
        let recentScans = [];
        let isScanning = false;
        let audioEnabled = true;
        let audioContext = null;
        
        // تهيئة الصوت
        function initAudio() {
            if (!audioContext && audioEnabled) {
                try {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                } catch(e) {
                    console.log('⚠️ Web Audio API غير مدعوم');
                }
            }
            return audioContext;
        }
        
        function playBeep(frequency, duration) {
            if (!audioEnabled) return;
            
            try {
                const ctx = initAudio();
                if (!ctx || ctx.state === 'closed') return;
                
                const oscillator = ctx.createOscillator();
                const gainNode = ctx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(ctx.destination);
                
                oscillator.type = 'sine';
                oscillator.frequency.value = frequency;
                gainNode.gain.value = 0.15;
                
                oscillator.start();
                gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
                oscillator.stop(ctx.currentTime + duration);
            } catch(e) {
                console.log('⚠️ خطأ في تشغيل الصوت:', e);
            }
        }
        
        function playScanSound() {
            playBeep(800, 0.2);
        }
        
        function playSuccessSound() {
            playBeep(1046.50, 0.15);
            setTimeout(() => playBeep(1318.52, 0.15), 150);
            setTimeout(() => playBeep(1567.98, 0.3), 300);
        }
        
        function playErrorSound() {
            playBeep(440, 0.3);
            setTimeout(() => playBeep(349.23, 0.3), 300);
        }
        
        function playWelcomeSound() {
            if (!audioEnabled) return;
            
            const notes = [523.25, 587.33, 659.25, 783.99];
            notes.forEach((freq, i) => {
                setTimeout(() => playBeep(freq, 0.2), i * 150);
            });
        }
        
        // تفعيل الصوت عند أول نقرة
        document.addEventListener('click', function enableAudio() {
            if (audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }
            document.removeEventListener('click', enableAudio);
        }, { once: true });
        
        // تحديث الوقت
        function updateDateTime() {
            const now = new Date();
            document.getElementById('timeDisplay').textContent = now.toLocaleTimeString('ar-EG');
            document.getElementById('dateDisplay').textContent = now.toLocaleDateString('ar-EG', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }
        
        // تحديث الحالة
        function updateStatus(text, statusClass, icon) {
            const statusElement = document.getElementById('scannerStatus');
            statusElement.className = `status-indicator ${statusClass}`;
            statusElement.innerHTML = `<i class="bi ${icon}"></i><span>${text}</span>`;
        }
        
        // عرض بطاقة الطالب الافتراضية
        function displayVirtualStudentCard(student, cardUid = null) {
            const defaultAvatar = `<i class="bi bi-person-circle" style="font-size: 60px;"></i>`;
            const avatarUrl = student.avatarUrl || `https://ui-avatars.com/api/?name=${encodeURIComponent(student.name)}&background=4361ee&color=fff&size=100&bold=true&length=2`;
            
            const expiryDate = new Date();
            expiryDate.setFullYear(expiryDate.getFullYear() + 2);
            const expiryStr = `${expiryDate.getMonth()+1}/${expiryDate.getFullYear().toString().slice(-2)}`;
            
            const cardNumber = cardUid || student.cardUid || '**** **** **** ' + (student.studentId?.slice(-4) || '0000');
            const formattedCardNumber = cardNumber.match(/.{1,4}/g)?.join(' ') || cardNumber;
            
            return `
                <div class="virtual-student-card animate__animated animate__fadeInUp">
                    <div class="card-chip">
                        <i class="bi bi-wifi"></i>
                    </div>
                    <div class="text-center">
                        <div class="student-avatar-large mx-auto">
                            <img src="${avatarUrl}" alt="${student.name}" style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover;" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(student.name)}&background=4361ee&color=fff&size=100&bold=true'">
                        </div>
                        <h3 class="student-name-card mt-3">${student.name}</h3>
                        <div class="student-id-card">رقم الطالب: ${student.studentId || 'غير محدد'}</div>
                        <div class="card-number">
                            <i class="bi bi-credit-card"></i> ${formattedCardNumber}
                        </div>
                        <div class="card-expiry">
                            <span><i class="bi bi-calendar"></i> صالحة حتى: ${expiryStr}</span>
                            <span><i class="bi bi-shield-check"></i> بطاقة ذكية</span>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // عرض معلومات الطالب
        function displayStudentInfo(student, classInfo = null, attendance = null) {
            const resultDiv = document.getElementById('scanResult');
            const status = attendance?.status || 'present';
            const statusText = status === 'present' ? '✅ حاضر' : status === 'late' ? '⚠️ متأخر' : '❌ غائب';
            const statusClass = status === 'present' ? 'success' : status === 'late' ? 'warning' : 'danger';
            
            let classHtml = '';
            if (classInfo) {
                classHtml = `
                    <div class="info-item bg-light p-3 rounded mb-2">
                        <div class="info-label text-muted">الحصة</div>
                        <div class="info-value fw-bold">${classInfo.name || 'غير محدد'}</div>
                        <div class="info-label text-muted mt-2">المادة</div>
                        <div class="info-value">${classInfo.subject || 'غير محدد'}</div>
                        ${classInfo.teacher ? `<div class="info-label text-muted mt-2">الأستاذ</div><div class="info-value">${classInfo.teacher.name || classInfo.teacher}</div>` : ''}
                    </div>
                `;
            }
            
            resultDiv.innerHTML = `
                <div class="animate__animated animate__fadeIn">
                    ${displayVirtualStudentCard(student)}
                    
                    <div class="row mt-3 g-3">
                        <div class="col-md-6">
                            <div class="bg-${statusClass} bg-opacity-10 p-3 rounded text-center">
                                <i class="bi ${status === 'present' ? 'bi-check-circle-fill' : status === 'late' ? 'bi-exclamation-triangle-fill' : 'bi-x-circle-fill'} display-6 text-${statusClass}"></i>
                                <h5 class="mt-2 text-${statusClass}">${statusText}</h5>
                                ${attendance?.time ? `<small class="text-muted">${new Date(attendance.time).toLocaleTimeString('ar-EG')}</small>` : ''}
                            </div>
                        </div>
                        <div class="col-md-6">
                            ${classHtml || '<div class="bg-info bg-opacity-10 p-3 rounded text-center"><i class="bi bi-info-circle display-6"></i><h5 class="mt-2">لا توجد حصص حالياً</h5></div>'}
                        </div>
                    </div>
                    
                    <div class="row mt-3">
                        <div class="col-12">
                            <div class="bg-light p-3 rounded">
                                <h6><i class="bi bi-telephone"></i> معلومات الاتصال</h6>
                                <div class="row">
                                    <div class="col-6">
                                        <small class="text-muted">ولي الأمر</small>
                                        <div>${student.parentName || 'غير محدد'}</div>
                                    </div>
                                    <div class="col-6">
                                        <small class="text-muted">رقم الهاتف</small>
                                        <div>${student.parentPhone || 'غير محدد'}</div>
                                    </div>
                                </div>
                                <div class="row mt-2">
                                    <div class="col-12">
                                        <small class="text-muted">السنة الدراسية</small>
                                        <div>${getAcademicYearName(student.academicYear)}</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // معالجة النجاح
        function handleSuccessfulAttendance(data) {
            console.log('✅ نجاح تسجيل الحضور:', data);
            
            const student = data.data?.student;
            const classInfo = data.data?.class;
            const attendance = data.data?.attendance;
            
            if (student) {
                displayStudentInfo(student, classInfo, attendance);
                addToRecentScans({
                    type: 'success',
                    student: { name: student.name, studentId: student.studentId },
                    timestamp: new Date()
                });
                playSuccessSound();
                updateStatus('تم التسجيل بنجاح', 'status-success', 'bi-check-circle');
                showToast('success', `تم تسجيل ${attendance?.status === 'present' ? 'حضور' : 'تأخير'} الطالب ${student.name}`);
            } else {
                showErrorResult('بيانات الطالب غير مكتملة');
            }
        }
        
        // معالجة الخطأ
        function handleFailedAttendance(data) {
            console.log('⚠️ فشل تسجيل الحضور:', data);
            showErrorResult(data.error || 'حدث خطأ أثناء التسجيل');
            playErrorSound();
            updateStatus('فشل التسجيل', 'status-error', 'bi-exclamation-triangle');
        }
        
        // عرض بطاقة غير معروفة
        function handleUnknownCard(cardUid) {
            const resultDiv = document.getElementById('scanResult');
            resultDiv.innerHTML = `
                <div class="virtual-student-card animate__animated animate__shake" style="background: linear-gradient(135deg, #e63946, #9d0208);">
                    <div class="text-center">
                        <i class="bi bi-exclamation-triangle display-1"></i>
                        <h3 class="mt-3">بطاقة غير معروفة</h3>
                        <div class="card-number">${cardUid}</div>
                        <p class="mt-3">هذه البطاقة غير مسجلة في النظام</p>
                        <button class="btn btn-light mt-3" onclick="clearScanner()">
                            <i class="bi bi-arrow-clockwise"></i> إعادة المحاولة
                        </button>
                    </div>
                </div>
            `;
            updateStatus('بطاقة غير معروفة', 'status-error', 'bi-exclamation-triangle');
            playErrorSound();
        }
        
        // معالجة البطاقة
        async function processCard(cardUid) {
            if (isScanning) {
                console.log('⏳ جاري معالجة بطاقة أخرى...');
                return;
            }
            
            try {
                isScanning = true;
                const cleanUid = cardUid.toString().trim();
                
                console.log('🔍 معالجة البطاقة:', cleanUid);
                
                if (cleanUid.length < 6) {
                    throw new Error('رقم البطاقة غير مكتمل');
                }
                
                updateStatus('جاري التعرف على البطاقة...', 'status-scanning', 'bi-arrow-repeat');
                playScanSound();
                
                // عرض حالة التحميل
                document.getElementById('scanResult').innerHTML = `
                    <div class="text-center py-5">
                        <div class="loading-spinner"></div>
                        <h5 class="mt-3">جاري المعالجة...</h5>
                        <p class="text-muted">يرجى الانتظار</p>
                    </div>
                `;
                
                const response = await fetch('/api/attendance/card-scan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cardUid: cleanUid, sendSMS: false })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    handleSuccessfulAttendance(data);
                } else {
                    handleFailedAttendance(data);
                }
                
            } catch (error) {
                console.error('❌ خطأ:', error);
                
                // محاولة البحث المحلي
                try {
                    const localResponse = await fetch(`/api/cards/uid/${cardUid}`);
                    if (localResponse.ok) {
                        const cardData = await localResponse.json();
                        if (cardData.student) {
                            displayStudentInfo(cardData.student);
                            addToRecentScans({
                                type: 'info',
                                student: { name: cardData.student.name, studentId: cardData.student.studentId },
                                timestamp: new Date()
                            });
                            updateStatus('تم التعرف على الطالب', 'status-success', 'bi-check-circle');
                            return;
                        }
                    }
                    handleUnknownCard(cardUid);
                } catch (localError) {
                    handleUnknownCard(cardUid);
                }
            } finally {
                isScanning = false;
                setTimeout(() => {
                    updateStatus('جاهز لمسح البطاقة', 'status-ready', 'bi-check-circle');
                }, 2000);
                
                document.getElementById('cardInput').value = '';
                document.getElementById('cardInput').focus();
            }
        }
        
        // إضافة للمسحات الحديثة
        function addToRecentScans(scan) {
            recentScans.unshift({
                ...scan,
                timestamp: scan.timestamp || new Date()
            });
            
            if (recentScans.length > 10) recentScans.pop();
            localStorage.setItem('studentCardRecentScans', JSON.stringify(recentScans));
            updateRecentScansList();
        }
        
        function updateRecentScansList() {
            const listElement = document.getElementById('recentScansList');
            
            if (recentScans.length === 0) {
                listElement.innerHTML = '<div class="recent-scan-item text-muted"><span>لا توجد عمليات مسح حديثة</span></div>';
                return;
            }
            
            listElement.innerHTML = recentScans.map(scan => {
                const timeString = new Date(scan.timestamp).toLocaleTimeString('ar-EG');
                const statusClass = scan.type === 'success' ? 'text-success' : scan.type === 'warning' ? 'text-warning' : 'text-danger';
                const statusIcon = scan.type === 'success' ? 'bi-check-circle-fill' : scan.type === 'warning' ? 'bi-exclamation-triangle-fill' : 'bi-x-circle-fill';
                
                return `
                    <div class="recent-scan-item animate__animated animate__fadeIn d-flex justify-content-between align-items-center p-2 border-bottom">
                        <div>
                            <i class="bi ${statusIcon} ${statusClass}"></i>
                            <strong>${scan.student?.name || 'طالب'}</strong>
                            ${scan.student?.studentId ? `<br><small class="text-muted">${scan.student.studentId}</small>` : ''}
                        </div>
                        <div class="text-end">
                            <small class="scan-time text-muted">${timeString}</small>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function loadRecentScans() {
            const saved = localStorage.getItem('studentCardRecentScans');
            if (saved) {
                try {
                    recentScans = JSON.parse(saved);
                    updateRecentScansList();
                } catch(e) {}
            }
        }
        
        function showToast(type, message) {
            const toast = document.createElement('div');
            toast.className = `alert-message alert-${type} animate__animated animate__fadeInDown`;
            toast.innerHTML = `<i class="bi ${type === 'success' ? 'bi-check-circle-fill' : 'bi-exclamation-triangle-fill'}"></i><span>${message}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('animate__fadeOutUp');
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }
        
        function showErrorResult(message) {
            const resultDiv = document.getElementById('scanResult');
            resultDiv.innerHTML = `
                <div class="virtual-student-card animate__animated animate__shake" style="background: linear-gradient(135deg, #e63946, #9d0208);">
                    <div class="text-center">
                        <i class="bi bi-x-circle display-1"></i>
                        <h3 class="mt-3">حدث خطأ</h3>
                        <p>${message}</p>
                        <button class="btn btn-light mt-3" onclick="clearScanner()">
                            <i class="bi bi-arrow-clockwise"></i> إعادة المحاولة
                        </button>
                    </div>
                </div>
            `;
        }
        
        function getAcademicYearName(code) {
            const years = {
                '1AS': 'الأولى ثانوي', '2AS': 'الثانية ثانوي', '3AS': 'الثالثة ثانوي',
                '1MS': 'الأولى متوسط', '2MS': 'الثانية متوسط', '3MS': 'الثالثة متوسط', '4MS': 'الرابعة متوسط',
                '1AP': 'الأولى ابتدائي', '2AP': 'الثانية ابتدائي', '3AP': 'الثالثة ابتدائي', '4AP': 'الرابعة ابتدائي', '5AP': 'الخامسة ابتدائي'
            };
            return years[code] || code || 'غير محدد';
        }
        
        function focusScanner() {
            document.getElementById('cardInput').focus();
            showToast('info', 'الماسح الضوئي جاهز');
        }
        
        function clearScanner() {
            document.getElementById('cardInput').value = '';
            document.getElementById('scanResult').innerHTML = '';
            document.getElementById('cardInput').focus();
            updateStatus('جاهز لمسح البطاقة', 'status-ready', 'bi-check-circle');
        }
        
        function manualEntry() {
            document.getElementById('cardInput').focus();
            showToast('info', 'أدخل رقم البطاقة ثم اضغط Enter');
        }
        
        // تهيئة الماسح
        function setupScanner() {
            const cardInput = document.getElementById('cardInput');
            let scanBuffer = '';
            let scanTimeout = null;
            
            cardInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const value = e.target.value.trim();
                    if (value.length >= 6) {
                        processCard(value);
                    }
                }
            });
            
            document.addEventListener('keydown', function(e) {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                
                if (e.key >= '0' && e.key <= '9') {
                    e.preventDefault();
                    scanBuffer += e.key;
                    cardInput.value = scanBuffer;
                    
                    if (scanTimeout) clearTimeout(scanTimeout);
                    scanTimeout = setTimeout(() => {
                        if (scanBuffer.length >= 6) {
                            processCard(scanBuffer);
                        }
                        scanBuffer = '';
                        cardInput.value = '';
                        scanTimeout = null;
                    }, 80);
                }
            });
        }
        
        // تهيئة التطبيق
        function initApp() {
            console.log('🚀 تهيئة نظام تسجيل الطلاب...');
            updateDateTime();
            setInterval(updateDateTime, 1000);
            setupScanner();
            loadRecentScans();
            setTimeout(() => playWelcomeSound(), 500);
        }
        
        // بدء التشغيل
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
